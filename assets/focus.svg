<svg width="1000" height="420" viewBox="0 0 1000 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Focus areas</title>
  <desc id="desc">Four focus areas: AI Systems, Backend Engineering, Product Interfaces, and Local Workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1000" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1000" height="420" rx="28" fill="url(#grid)" opacity="0.7"/>
  <circle cx="830" cy="70" r="180" fill="#2563eb" opacity="0.12"/>
  <circle cx="120" cy="360" r="180" fill="#60a5fa" opacity="0.09"/>

  <text x="50" y="62" fill="#e5e7eb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Focus</text>
  <text x="50" y="92" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Where I spend most of my engineering attention</text>

  <g filter="url(#shadow)">
    <rect x="50" y="125" width="425" height="105" rx="20" fill="url(#card)" stroke="#1e3a8a"/>
    <rect x="525" y="125" width="425" height="105" rx="20" fill="url(#card)" stroke="#1e3a8a"/>
    <rect x="50" y="265" width="425" height="105" rx="20" fill="url(#card)" stroke="#1e3a8a"/>
    <rect x="525" y="265" width="425" height="105" rx="20" fill="url(#card)" stroke="#1e3a8a"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(75 149)">
      <circle cx="28" cy="28" r="28" fill="url(#blue)" opacity="0.95"/>
      <path d="M20 30c8-18 25-18 17 0-8 18-25 18-17 0Z" stroke="#f8fafc" stroke-width="3" fill="none" stroke-linecap="round"/>
      <text x="78" y="25" fill="#f8fafc" font-size="20" font-weight="700">AI Systems</text>
      <text x="78" y="52" fill="#cbd5e1" font-size="14">AI agents, dev tools, automation workflows</text>
    </g>

    <g transform="translate(550 149)">
      <circle cx="28" cy="28" r="28" fill="url(#blue)" opacity="0.95"/>
      <path d="M17 22h22M17 34h22M23 16v24M33 16v24" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>
      <text x="78" y="25" fill="#f8fafc" font-size="20" font-weight="700">Backend Engineering</text>
      <text x="78" y="52" fill="#cbd5e1" font-size="14">Services, APIs, integrations, data systems</text>
    </g>

    <g transform="translate(75 289)">
      <circle cx="28" cy="28" r="28" fill="url(#blue)" opacity="0.95"/>
      <rect x="15" y="18" width="26" height="21" rx="4" stroke="#f8fafc" stroke-width="3"/>
      <path d="M21 45h14" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>
      <text x="78" y="25" fill="#f8fafc" font-size="20" font-weight="700">Product Interfaces</text>
      <text x="78" y="52" fill="#cbd5e1" font-size="14">Minimal, fast, reliable, maintainable UI</text>
    </g>

    <g transform="translate(550 289)">
      <circle cx="28" cy="28" r="28" fill="url(#blue)" opacity="0.95"/>
      <path d="M17 23l9-7 9 7M17 34l9 7 9-7M41 23v18" stroke="#f8fafc" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="78" y="25" fill="#f8fafc" font-size="20" font-weight="700">Local Workflows</text>
      <text x="78" y="52" fill="#cbd5e1" font-size="14">Linux-first tools and reproducible setups</text>
    </g>
  </g>
</svg>
